# Qwen3 ASR ALB Ingress - 共享 speech-services ALB
# :8000 → ASR
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: qwen3-asr-ingress
  namespace: hosthree
  annotations:
    alb.ingress.kubernetes.io/group.name: speech-services
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":8000}]'
    alb.ingress.kubernetes.io/healthcheck-path: /health
spec:
  ingressClassName: alb
  rules:
  - http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: qwen3-asr-service
            port:
              number: 80
